<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>密码生成器</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#ffffff;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Roboto,system-ui,-apple-system,sans-serif;padding:1.5rem}.card{background:#ffffff;border-radius:2.5rem;box-shadow:0 12px 40px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.03);padding:2.5rem 2.2rem;max-width:620px;width:100%;transition:0.25s ease;border:1px solid #eef3f8}h1{font-size:2rem;font-weight:600;color:#0a2c44;letter-spacing:-0.02em;margin-bottom:1.75rem;display:flex;align-items:center;gap:0.5rem}.field-group{display:flex;flex-wrap:wrap;align-items:center;gap:1rem 1.5rem;margin-bottom:2rem;background:#f8fafc;padding:0.8rem 1.2rem;border-radius:60px;border:1px solid #e9edf2}.field-group label{font-weight:500;color:#0a334a;letter-spacing:0.3px;font-size:1rem;display:flex;align-items:center;gap:0.6rem}.field-group input[type="number"]{width:80px;padding:0.5rem 0.3rem 0.5rem 0.9rem;border:1px solid #d0d8e0;border-radius:40px;font-size:1rem;font-weight:500;background:white;color:#062434;outline:none;transition:0.2s;box-shadow:inset 0 1px 3px rgba(0,0,0,0.02)}.field-group input[type="number"]:focus{border-color:#2f7eb3;box-shadow:0 0 0 3px rgba(47,126,179,0.12)}.field-group input[type="number"]::-webkit-inner-spin-button{opacity:1}.checkbox-grid{display:flex;flex-wrap:wrap;gap:0.8rem 1.8rem;margin-bottom:2rem;background:#f8fafc;padding:0.9rem 1.2rem;border-radius:48px;border:1px solid #e9edf2}.checkbox-item{display:flex;align-items:center;gap:0.4rem;font-size:0.95rem;font-weight:500;color:#0a334a;cursor:pointer;transition:0.1s}.checkbox-item input[type="checkbox"]{width:18px;height:18px;accent-color:#2f7eb3;cursor:pointer;border-radius:6px;transition:0.15s;flex-shrink:0}.checkbox-item input[type="checkbox"]:hover{transform:scale(1.05)}.generate-btn{background:#2f7eb3;border:none;color:white;font-size:1.2rem;font-weight:600;padding:0.9rem 1.8rem;border-radius:60px;width:100%;cursor:pointer;transition:0.2s;box-shadow:0 6px 16px rgba(47,126,179,0.2);letter-spacing:0.8px;display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:2rem;border:1px solid rgba(255,255,255,0.2)}.generate-btn:hover{background:#1f6a9c;transform:scale(1.01);box-shadow:0 8px 20px rgba(47,126,179,0.25)}.generate-btn:active{transform:scale(0.97);background:#145580}.result-area{background:#f8fafc;border-radius:60px;padding:0.2rem 0.2rem 0.2rem 1.8rem;display:flex;align-items:center;justify-content:space-between;border:1px solid #e9edf2;transition:0.2s;margin-top:0.2rem}.result-area:focus-within{border-color:#2f7eb3;box-shadow:0 0 0 3px rgba(47,126,179,0.1)}#passwordDisplay{border:none;background:transparent;font-size:1.3rem;font-weight:500;color:#062434;padding:0.8rem 0.2rem;width:100%;outline:none;font-family:'SF Mono','Fira Code','Cascadia Code',monospace;letter-spacing:0.5px;overflow-x:auto;white-space:nowrap}#passwordDisplay::placeholder{color:#b0c0ce;font-weight:400;font-family:'Segoe UI',sans-serif;letter-spacing:0.3px;opacity:0.7}.copy-btn{background:#e9edf2;border:none;padding:0.65rem 1.4rem;border-radius:40px;font-weight:600;color:#0a334a;font-size:0.95rem;display:flex;align-items:center;gap:6px;cursor:pointer;transition:0.15s;white-space:nowrap;border:1px solid transparent;flex-shrink:0;margin-left:0.5rem}.copy-btn:hover{background:#dce3eb;border-color:#c5ced9;color:#062434;transform:scale(0.97)}.copy-btn:active{background:#cdd6e0;transform:scale(0.93)}.copy-btn.copied{background:#c8e0c8;color:#1f4f2a;border-color:#a8c8a8}.footnote{margin-top:1.5rem;font-size:0.8rem;color:#7a8f9e;text-align:center;opacity:0.7;letter-spacing:0.3px;border-top:1px solid #eef2f6;padding-top:1.2rem}@media (max-width:480px){.card{padding:1.5rem 1rem}.field-group{flex-direction:column;align-items:stretch;gap:0.6rem;border-radius:32px;padding:1rem}.field-group label{justify-content:space-between}.field-group input[type="number"]{width:100%}.checkbox-grid{border-radius:32px;flex-direction:column;gap:0.4rem;padding:1rem 1.2rem}.result-area{flex-wrap:wrap;padding:0.6rem 0.6rem 0.6rem 1rem;border-radius:40px}#passwordDisplay{font-size:1.1rem;padding:0.5rem 0}.copy-btn{padding:0.5rem 1rem;font-size:0.9rem;margin-left:0;margin-top:0.2rem;width:100%;justify-content:center}}</style></head><body><div class="card"><h1>密码生成器</h1><div class="field-group"><label for="lengthInput">长度<input type="number" id="lengthInput" min="4" max="64" value="16" step="1"></label><span style="font-size:0.9rem;color:#6a7f8e;margin-left:auto;">4–64</span></div><div class="checkbox-grid" id="checkboxGroup"><label class="checkbox-item"><input type="checkbox" id="chkLower" checked>小写字母</label><label class="checkbox-item"><input type="checkbox" id="chkUpper" checked>大写字母</label><label class="checkbox-item"><input type="checkbox" id="chkDigits" checked>数字</label><label class="checkbox-item"><input type="checkbox" id="chkSymbols" checked>符号</label></div><button class="generate-btn" id="generateBtn">生成密码</button><div class="result-area"><input type="text" id="passwordDisplay" placeholder="点击生成" readonly><button class="copy-btn" id="copyBtn">复制</button></div><div class="footnote">孤光</div></div><script>(function(){"use strict";const lengthInput=document.getElementById('lengthInput');const chkLower=document.getElementById('chkLower');const chkUpper=document.getElementById('chkUpper');const chkDigits=document.getElementById('chkDigits');const chkSymbols=document.getElementById('chkSymbols');const generateBtn=document.getElementById('generateBtn');const passwordDisplay=document.getElementById('passwordDisplay');const copyBtn=document.getElementById('copyBtn');const CHAR_SETS={lower:'abcdefghijklmnopqrstuvwxyz',upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',digits:'0123456789',symbols:'!@#$%^&*()_+-=[]{}|;:,.<>?'};function getRandomCharFromString(str){return str.charAt(Math.floor(Math.random()*str.length))}function generatePassword(){let rawLength=lengthInput.value.trim();let length=parseInt(rawLength,10);if(isNaN(length)||length<4)length=4;if(length>64)length=64;lengthInput.value=length;let availableChars='';if(chkLower.checked)availableChars+=CHAR_SETS.lower;if(chkUpper.checked)availableChars+=CHAR_SETS.upper;if(chkDigits.checked)availableChars+=CHAR_SETS.digits;if(chkSymbols.checked)availableChars+=CHAR_SETS.symbols;if(availableChars.length===0){chkLower.checked=true;chkDigits.checked=true;availableChars=CHAR_SETS.lower+CHAR_SETS.digits;console.warn('没有选择字符集，已自动启用小写字母和数字')}const charsArray=availableChars.split('');const arrayLen=charsArray.length;let password='';if(window.crypto&&window.crypto.getRandomValues){const randomBuffer=new Uint32Array(length);window.crypto.getRandomValues(randomBuffer);for(let i=0;i<length;i++){const randomIndex=randomBuffer[i]%arrayLen;password+=charsArray[randomIndex]}}else{for(let i=0;i<length;i++){const randomIndex=Math.floor(Math.random()*arrayLen);password+=charsArray[randomIndex]}}const activeTypes=[];if(chkLower.checked)activeTypes.push(CHAR_SETS.lower);if(chkUpper.checked)activeTypes.push(CHAR_SETS.upper);if(chkDigits.checked)activeTypes.push(CHAR_SETS.digits);if(chkSymbols.checked)activeTypes.push(CHAR_SETS.symbols);if(length>=activeTypes.length&&activeTypes.length>0){let attempts=0;const maxAttempts=20;let valid=false;while(!valid&&attempts<maxAttempts){let candidate='';const randomBuffer=new Uint32Array(length);window.crypto.getRandomValues(randomBuffer);for(let i=0;i<length;i++){const randomIndex=randomBuffer[i]%arrayLen;candidate+=charsArray[randomIndex]}let allIncluded=true;for(let set of activeTypes){let hasChar=false;for(let ch of set){if(candidate.includes(ch)){hasChar=true;break}}if(!hasChar){allIncluded=false;break}}if(allIncluded){password=candidate;valid=true;break}attempts++}if(!valid){let forcedPassword='';for(let set of activeTypes){forcedPassword+=getRandomCharFromString(set)}const remainingLength=length-activeTypes.length;const randomBuffer=new Uint32Array(remainingLength);window.crypto.getRandomValues(randomBuffer);for(let i=0;i<remainingLength;i++){const randomIndex=randomBuffer[i]%arrayLen;forcedPassword+=charsArray[randomIndex]}const pwdArray=forcedPassword.split('');for(let i=pwdArray.length-1;i>0;i--){const randomIndex=Math.floor(Math.random()*(i+1));[pwdArray[i],pwdArray[randomIndex]]=[pwdArray[randomIndex],pwdArray[i]]}password=pwdArray.join('')}}if(password.length!==length){while(password.length<length){password+=getRandomCharFromString(availableChars)}if(password.length>length){password=password.slice(0,length)}}return password}function refreshPassword(){const newPassword=generatePassword();passwordDisplay.value=newPassword;copyBtn.classList.remove('copied');copyBtn.innerHTML='复制';return newPassword}function copyPassword(){const textToCopy=passwordDisplay.value;if(!textToCopy||textToCopy.trim()===''){refreshPassword();const newText=passwordDisplay.value;if(!newText)return;copyToClipboard(newText)}else{copyToClipboard(textToCopy)}}function copyToClipboard(text){if(!text)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>{setCopiedState()}).catch(err=>{fallbackCopy(text)})}else{fallbackCopy(text)}}function fallbackCopy(text){const textarea=document.createElement('textarea');textarea.value=text;textarea.style.position='fixed';textarea.style.opacity='0';textarea.style.left='-9999px';textarea.style.top='-9999px';document.body.appendChild(textarea);textarea.select();try{const success=document.execCommand('copy');if(success){setCopiedState()}else{alert('复制失败，您可以手动选中密码复制。')}}catch(e){alert('复制失败，您可以手动选中密码复制。')}document.body.removeChild(textarea)}function setCopiedState(){copyBtn.classList.add('copied');copyBtn.innerHTML='已复制';setTimeout(()=>{copyBtn.classList.remove('copied');copyBtn.innerHTML='复制'},2200)}generateBtn.addEventListener('click',function(e){e.preventDefault();refreshPassword()});copyBtn.addEventListener('click',function(e){e.preventDefault();copyPassword()});lengthInput.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();refreshPassword()}});document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();refreshPassword()}});window.addEventListener('load',function(){refreshPassword()});lengthInput.addEventListener('change',function(){let val=parseInt(this.value,10);if(isNaN(val)||val<4)this.value=4;if(val>64)this.value=64});lengthInput.addEventListener('blur',function(){let val=parseInt(this.value,10);if(isNaN(val)||val<4)this.value=4;if(val>64)this.value=64})})();</script></body></html>
